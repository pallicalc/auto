<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research QR Generator | PalliCalc</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <script src="/js/qr.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { 
            --primary: #6f42c1; 
            --primary-hover: #5a32a3;
            --success: #198754; 
            --text-dark: #212529; 
            --border-radius: 12px; 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: #eef2f5; 
            margin: 0; 
            padding: 20px; 
            color: var(--text-dark); 
        }

        .main-container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: white; 
            border-radius: var(--border-radius); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            overflow: hidden; 
        }

        .app-header { background: var(--primary); padding: 20px; text-align: center; color: white; }
        .app-header h1 { margin: 0; font-size: 1.3rem; font-weight: 700; }
        .app-header p { margin: 5px 0 0; font-size: 0.9rem; opacity: 0.9; }

        .back-nav { padding: 15px 20px 0; }
        .back-nav a { color: #6c757d; text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        .back-nav a:hover { color: var(--primary); }

        .form-section { padding: 20px; }

        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 0.85rem; font-weight: 700; color: #6c757d; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 1rem; font-family: 'Inter', sans-serif; }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(111, 66, 193, 0.15); }

        .btn-action { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; margin-top: 10px;}
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 6px rgba(111, 66, 193, 0.2); }
        .btn-primary:hover { background: var(--primary-hover); }

        .btn-outline { background: white; border: 2px solid #e9ecef; color: #495057; }
        .btn-outline:hover { background: #f8f9fa; border-color: #ced4da; }

        .result-card { background: white; border: 1px solid #ced4da; border-radius: 8px; padding: 20px; margin-top: 20px; display: none; }

        /* Hidden HTML template used to draw the image */
        #html-template {
            position: absolute;
            left: -9999px; /* Keep it off-screen so user only sees the final JPG */
        }

        /* 50mm x 30mm Proportions (500x300 pixels) */
        .sticker-container { 
            width: 500px;
            height: 300px;
            display: flex; 
            align-items: center; 
            gap: 20px; 
            text-align: left; 
            padding: 20px;
            background: #ffffff; /* Must be pure white for JPG */
            box-sizing: border-box;
        }
        
        .sticker-left { flex-shrink: 0; }
        #qrcode { padding: 5px; background: white; display: inline-block; }
        
        .sticker-right { flex-grow: 1; font-size: 22px; line-height: 1.5; color: #000000; font-family: 'Inter', sans-serif;}
        .sticker-detail { margin-bottom: 8px; }

        /* Final Displayed JPG */
        .final-image-wrapper { text-align: center; margin-bottom: 15px; }
        #final-sticker-img { 
            width: 100%; 
            max-width: 350px; /* Scale down visually on screen, but actual file is 500x300 */
            border: 2px dashed #ced4da; 
            border-radius: 8px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .payload-display { font-family: monospace; font-size: 0.85rem; color: #6c757d; margin-top: 15px; word-break: break-all; background: #e9ecef; padding: 8px; border-radius: 4px; text-align: center;}
        .instruction-text { font-size: 0.85rem; color: #6c757d; text-align: center; margin-bottom: 15px; font-weight: 600;}
    </style>
</head>
<body>

<div class="main-container">

    <div class="back-nav">
        <a href="research.html"><i class="bi bi-arrow-left"></i> Back to Research Hub</a>
    </div>

    <div class="app-header" style="margin-top: 15px;">
        <h1><i class="bi bi-qr-code"></i> ID QR Generator</h1>
        <p>Create Smart Stickers for Offline Scanning</p>
    </div>

    <div class="form-section">
        <div class="form-group">
            <label class="form-label">1. Patient IC (Required)</label>
            <input type="text" id="gen_ic" class="form-control" placeholder="e.g. 020502050075" maxlength="12">
        </div>

        <div class="form-group">
            <label class="form-label">2. Research ID / Patient Name</label>
            <input type="text" id="gen_name" class="form-control" placeholder="e.g. RES-001 or Ali Alex">
        </div>

        <div class="form-group">
            <label class="form-label">3. Study Notes / Cohort</label>
            <input type="text" id="gen_notes" class="form-control" placeholder="e.g. Study-Group-A">
        </div>

        <button onclick="generateSmartQR()" class="btn-action btn-primary" id="generate-btn">
            <i class="bi bi-magic"></i> Generate Smart QR
        </button>
    </div>

    <div id="html-template">
        <div class="sticker-container" id="printable-sticker">
            <div class="sticker-left">
                <div id="qrcode"></div>
            </div>
            <div class="sticker-right">
                <div class="sticker-detail"><strong>Patient:</strong> <span id="lbl_name"></span></div>
                <div class="sticker-detail"><strong>IC No:</strong> <span id="lbl_ic"></span></div>
                <div class="sticker-detail" style="margin-top:12px; border-top:2px solid #ddd; padding-top:12px;">
                    <strong>Notes:</strong> <br><span id="lbl_notes" style="font-size:18px; font-style:italic;"></span>
                </div>
            </div>
        </div>
    </div>

    <div id="result-area" class="result-card">
        <h5 style="margin-top:0; color:var(--success); text-align: center;"><i class="bi bi-check-circle-fill"></i> Sticker Ready</h5>
        
        <p class="instruction-text"><i class="bi bi-hand-index-thumb"></i> Long-press the image below to Copy or Save</p>

        <div class="final-image-wrapper">
            <img id="final-sticker-img" src="" alt="QR Sticker">
        </div>

        <div class="payload-display" id="payload-text"></div>

        <button onclick="clearForm()" class="btn-action btn-outline">
            <i class="bi bi-arrow-counterclockwise"></i> Clear
        </button>
    </div>

</div>

<script>
    function generateSmartQR() {
        const ic = document.getElementById('gen_ic').value.trim();
        const name = document.getElementById('gen_name').value.trim();
        const notes = document.getElementById('gen_notes').value.trim();
        const btn = document.getElementById('generate-btn');

        if (!ic) {
            alert("Please enter the Patient IC.");
            document.getElementById('gen_ic').focus();
            return;
        }

        // UX: Show loading state on button
        btn.innerHTML = `<i class="bi bi-hourglass-split"></i> Generating...`;
        btn.disabled = true;

        // 1. Update Hidden HTML Template Details
        document.getElementById('lbl_ic').innerText = ic;
        document.getElementById('lbl_name').innerText = name || "---";
        document.getElementById('lbl_notes').innerText = notes || "N/A";

        // 2. Construct Payload
        let payloadArray = [ic];
        if (name || notes) {
            payloadArray.push(name || "");
            if (notes) payloadArray.push(notes);
        }
        const finalPayload = payloadArray.join('|');

        // 3. Generate QR graphic into the hidden template
        const qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = ""; 

        try {
            new QRCode(qrContainer, {
                text: finalPayload,
                width: 220, // Sized perfectly for the 500x300 box
                height: 220,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.M 
            });

            // 4. Wait a tiny bit for the QR code canvas to finish rendering, then convert to JPG
            setTimeout(() => {
                const stickerElement = document.getElementById('printable-sticker');
                
                html2canvas(stickerElement, {
                    scale: 2, // Doubles the resolution for a crisp print
                    backgroundColor: "#ffffff",
                    logging: false
                }).then(canvas => {
                    // Convert canvas to JPG
                    const imgData = canvas.toDataURL("image/jpeg", 1.0);
                    
                    // Set the src of the visible image to the new JPG data
                    document.getElementById('final-sticker-img').src = imgData;
                    
                    // Show result UI
                    document.getElementById("result-area").style.display = "block";
                    document.getElementById("payload-text").innerText = "Scanner Payload: " + finalPayload;

                    // Reset button
                    btn.innerHTML = `<i class="bi bi-magic"></i> Generate Smart QR`;
                    btn.disabled = false;
                });
            }, 100); // 100ms delay ensures QR is drawn before snapshot

        } catch (err) {
            console.error("QR Error:", err);
            alert("Error generating QR code. Check if qr.min.js is in your /js/ folder.");
            btn.innerHTML = `<i class="bi bi-magic"></i> Generate Smart QR`;
            btn.disabled = false;
        }
    }

    function clearForm() {
        document.getElementById('gen_ic').value = '';
        document.getElementById('gen_name').value = '';
        document.getElementById('gen_notes').value = '';
        document.getElementById("result-area").style.display = "none";
        document.getElementById('gen_ic').focus();
    }
</script>

</body>
</html>
