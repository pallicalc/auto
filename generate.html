<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research QR Generator | PalliCalc</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <script src="/js/qr.min.js"></script>

    <style>
        :root { --primary: #0d6efd; --success: #198754; --bg-light: #f8f9fa; --text-dark: #212529; --border-radius: 12px; }
        body { font-family: 'Inter', sans-serif; background: #eef2f5; margin: 0; padding: 20px; color: var(--text-dark); }
        .main-container { max-width: 500px; margin: 0 auto; background: white; border-radius: var(--border-radius); box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }

        .app-header { background: var(--primary); padding: 20px; text-align: center; color: white; }
        .app-header h1 { margin: 0; font-size: 1.3rem; font-weight: 700; }
        .app-header p { margin: 5px 0 0; font-size: 0.9rem; opacity: 0.9; }

        .form-section { padding: 20px; }
        
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 0.85rem; font-weight: 700; color: #6c757d; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 1rem; font-family: 'Inter', sans-serif; }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15); }

        .btn-action { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 6px rgba(13, 110, 253, 0.2); }
        .btn-primary:hover { background: #0b5ed7; }
        
        .btn-outline { background: white; border: 2px solid #e9ecef; color: #495057; margin-top: 10px; }
        .btn-outline:hover { background: #f8f9fa; border-color: #ced4da; }

        .result-card { background: #f8f9fa; border: 1px dashed #ced4da; border-radius: 8px; padding: 20px; text-align: center; margin-top: 20px; display: none; }
        #qrcode { display: inline-block; padding: 15px; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .payload-display { font-family: monospace; font-size: 0.85rem; color: #6c757d; margin-top: 15px; word-break: break-all; background: #e9ecef; padding: 8px; border-radius: 4px; }
        
        /* Utility class to hide elements during printing */
        @media print {
            body { background: white; padding: 0; }
            .no-print { display: none !important; }
            .main-container { box-shadow: none; max-width: 100%; }
            .result-card { border: none; background: white; margin: 0; padding: 0; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="app-header no-print">
        <h1><i class="bi bi-qr-code"></i> ID QR Generator</h1>
        <p>Create Smart Stickers for Offline Scanning</p>
    </div>

    <div class="form-section no-print">
        <div class="form-group">
            <label class="form-label">1. Patient IC (Required)</label>
            <input type="text" id="gen_ic" class="form-control" placeholder="e.g. 020502050075" maxlength="12">
        </div>

        <div class="form-group">
            <label class="form-label">2. Research ID / Patient Name (Optional)</label>
            <input type="text" id="gen_name" class="form-control" placeholder="e.g. RES-001 or Ali Alex">
        </div>

        <div class="form-group">
            <label class="form-label">3. Study Notes / Cohort (Optional)</label>
            <input type="text" id="gen_notes" class="form-control" placeholder="e.g. Study-Group-A">
        </div>

        <button onclick="generateSmartQR()" class="btn-action btn-primary">
            <i class="bi bi-magic"></i> Generate Smart QR
        </button>
    </div>

    <div id="result-area" class="result-card">
        <h5 class="no-print" style="margin-top:0; color:var(--success);"><i class="bi bi-check-circle-fill"></i> QR Code Ready</h5>
        
        <div id="qrcode"></div>
        
        <div class="payload-display no-print" id="payload-text"></div>
        
        <button onclick="window.print()" class="btn-action btn-outline no-print">
            <i class="bi bi-printer"></i> Print Sticker
        </button>
    </div>
</div>

<script>
    function generateSmartQR() {
        const ic = document.getElementById('gen_ic').value.trim();
        const name = document.getElementById('gen_name').value.trim();
        const notes = document.getElementById('gen_notes').value.trim();

        if (!ic) {
            alert("Please enter at least the Patient IC.");
            document.getElementById('gen_ic').focus();
            return;
        }

        // --- CONSTRUCT THE PAYLOAD ---
        // Format: IC|Name|Notes
        let payloadArray = [ic];
        
        if (name || notes) {
            payloadArray.push(name); // Even if name is empty, we push it so notes sits in the 3rd slot
            if (notes) {
                payloadArray.push(notes);
            }
        }
        
        const finalPayload = payloadArray.join('|');

        // --- GENERATE THE QR CODE ---
        const qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = ""; // Clear previous QR

        try {
            new QRCode(qrContainer, {
                text: finalPayload,
                width: 150,
                height: 150,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.M // Medium error correction is perfect for physical stickers
            });

            // Show results
            document.getElementById("result-area").style.display = "block";
            document.getElementById("payload-text").innerText = "Payload: " + finalPayload;
            
        } catch (err) {
            console.error("QR Generation Error:", err);
            alert("Error generating QR code. Check if qr.min.js is properly linked.");
        }
    }
</script>

</body>
</html>
