<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research QR Generator | PalliCalc</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <script src="/js/qr.min.js"></script>

    <style>
        :root { 
            --primary: #6f42c1; /* Using purple to denote a Research Utility */
            --primary-hover: #5a32a3;
            --success: #198754; 
            --text-dark: #212529; 
            --border-radius: 12px; 
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #eef2f5; 
            margin: 0; 
            padding: 20px; 
            color: var(--text-dark); 
        }
        
        .main-container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: white; 
            border-radius: var(--border-radius); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            overflow: hidden; 
        }

        .app-header { 
            background: var(--primary); 
            padding: 20px; 
            text-align: center; 
            color: white; 
        }
        .app-header h1 { margin: 0; font-size: 1.3rem; font-weight: 700; }
        .app-header p { margin: 5px 0 0; font-size: 0.9rem; opacity: 0.9; }

        .back-nav { padding: 15px 20px 0; }
        .back-nav a { color: #6c757d; text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        .back-nav a:hover { color: var(--primary); }

        .form-section { padding: 20px; }
        
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 0.85rem; font-weight: 700; color: #6c757d; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 1rem; font-family: 'Inter', sans-serif; }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(111, 66, 193, 0.15); }

        .btn-action { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; margin-top: 10px;}
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 6px rgba(111, 66, 193, 0.2); }
        .btn-primary:hover { background: var(--primary-hover); }
        
        .btn-outline { background: white; border: 2px solid #e9ecef; color: #495057; }
        .btn-outline:hover { background: #f8f9fa; border-color: #ced4da; }

        /* Sticker Result Area */
        .result-card { background: white; border: 1px solid #ced4da; border-radius: 8px; padding: 20px; margin-top: 20px; display: none; }
        
        /* Side-by-side Sticker Layout */
        .sticker-container { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            text-align: left; 
            padding: 15px;
            background: white;
            border: 2px dashed #ced4da; /* Guide for cutting/peeling */
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .sticker-left { flex-shrink: 0; }
        .sticker-right { flex-grow: 1; font-size: 0.95rem; line-height: 1.5; color: #000; }
        .sticker-detail { margin-bottom: 4px; }
        #qrcode { padding: 5px; background: white; display: inline-block; }

        .payload-display { font-family: monospace; font-size: 0.85rem; color: #6c757d; margin-top: 15px; word-break: break-all; background: #e9ecef; padding: 8px; border-radius: 4px; text-align: center;}
        
        /* 🖨️ PRINT OPTIMIZATION */
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            .main-container { box-shadow: none; max-width: 100%; margin: 0; padding: 0; }
            
            /* Ensure the sticker prints perfectly at the top left of the label */
            .result-card { border: none; display: block !important; padding: 0; margin: 0; }
            .sticker-container { border: none; padding: 0; margin: 0; gap: 15px; }
            .sticker-right { font-size: 12pt; color: black; } /* Crisp black text for thermal printers */
        }
    </style>
</head>
<body>

<div class="main-container">
    
    <div class="back-nav no-print">
        <a href="research.html"><i class="bi bi-arrow-left"></i> Back to Research Hub</a>
    </div>

    <div class="app-header no-print" style="margin-top: 15px;">
        <h1><i class="bi bi-qr-code"></i> ID QR Generator</h1>
        <p>Create Smart Stickers for Offline Scanning</p>
    </div>

    <div class="form-section no-print">
        <div class="form-group">
            <label class="form-label">1. Patient IC (Required)</label>
            <input type="text" id="gen_ic" class="form-control" placeholder="e.g. 020502050075" maxlength="12">
        </div>

        <div class="form-group">
            <label class="form-label">2. Research ID / Patient Name</label>
            <input type="text" id="gen_name" class="form-control" placeholder="e.g. RES-001 or Ali Alex">
        </div>

        <div class="form-group">
            <label class="form-label">3. Study Notes / Cohort</label>
            <input type="text" id="gen_notes" class="form-control" placeholder="e.g. Study-Group-A">
        </div>

        <button onclick="generateSmartQR()" class="btn-action btn-primary">
            <i class="bi bi-magic"></i> Generate Smart QR
        </button>
    </div>

    <div id="result-area" class="result-card">
        <h5 class="no-print" style="margin-top:0; color:var(--success); text-align: center;"><i class="bi bi-check-circle-fill"></i> Sticker Ready</h5>
        
        <div class="sticker-container" id="printable-sticker">
            <div class="sticker-left">
                <div id="qrcode"></div>
            </div>
            <div class="sticker-right">
                <div class="sticker-detail"><strong>Patient:</strong> <span id="lbl_name"></span></div>
                <div class="sticker-detail"><strong>IC No:</strong> <span id="lbl_ic"></span></div>
                <div class="sticker-detail" style="margin-top:8px; border-top:1px solid #ddd; padding-top:8px;">
                    <strong>Notes:</strong> <br><span id="lbl_notes" style="font-size:0.85rem; font-style:italic;"></span>
                </div>
            </div>
        </div>
        
        <div class="payload-display no-print" id="payload-text"></div>
        
        <div class="no-print" style="display: flex; gap: 10px;">
            <button onclick="clearForm()" class="btn-action btn-outline" style="flex: 1;">
                <i class="bi bi-arrow-counterclockwise"></i> Clear
            </button>
            <button onclick="window.print()" class="btn-action" style="flex: 2; background: #212529; color: white;">
                <i class="bi bi-printer"></i> Print Sticker
            </button>
        </div>
    </div>
</div>

<script>
    function generateSmartQR() {
        const ic = document.getElementById('gen_ic').value.trim();
        const name = document.getElementById('gen_name').value.trim();
        const notes = document.getElementById('gen_notes').value.trim();

        if (!ic) {
            alert("Please enter the Patient IC.");
            document.getElementById('gen_ic').focus();
            return;
        }

        // 1. Update the Text Details for the UI Sticker
        document.getElementById('lbl_ic').innerText = ic;
        document.getElementById('lbl_name').innerText = name || "---";
        document.getElementById('lbl_notes').innerText = notes || "N/A";

        // 2. Construct the Smart Payload (Format: IC|Name|Notes)
        let payloadArray = [ic];
        if (name || notes) {
            payloadArray.push(name || ""); // Push empty string if name is blank but notes exist
            if (notes) {
                payloadArray.push(notes);
            }
        }
        const finalPayload = payloadArray.join('|');

        // 3. Generate the actual QR Code graphic
        const qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = ""; // Clear old QR

        try {
            new QRCode(qrContainer, {
                text: finalPayload,
                width: 120, // 120px is perfect for side-by-side labels
                height: 120,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.M 
            });

            // Show results
            document.getElementById("result-area").style.display = "block";
            document.getElementById("payload-text").innerText = "Scanner Payload: " + finalPayload;
            
        } catch (err) {
            console.error("QR Error:", err);
            alert("Error generating QR code. Check if qr.min.js is in your /js/ folder.");
        }
    }

    function clearForm() {
        // Reset Inputs
        document.getElementById('gen_ic').value = '';
        document.getElementById('gen_name').value = '';
        document.getElementById('gen_notes').value = '';
        
        // Hide Result Box
        document.getElementById("result-area").style.display = "none";
        
        // Put cursor back to the top
        document.getElementById('gen_ic').focus();
    }
</script>

</body>
</html>
