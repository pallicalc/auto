<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research ID Gen | PalliCalc</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <script src="/js/qr.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root { --primary: #6f42c1; --border-radius: 12px; }
        body { font-family: 'Inter', sans-serif; background: #eef2f5; margin: 0; padding: 15px; color: #212529; }
        .main-container { max-width: 500px; margin: 0 auto; background: white; border-radius: var(--border-radius); box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }
        .app-header { background: var(--primary); padding: 15px; text-align: center; color: white; }
        .app-header h1 { margin: 0; font-size: 1.2rem; }
        .form-section { padding: 15px; }
        .form-group { margin-bottom: 12px; }
        .form-label { display: block; font-size: 0.75rem; font-weight: 700; color: #6c757d; margin-bottom: 4px; text-transform: uppercase; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; }
        
        .layout-picker { display: flex; gap: 5px; margin-bottom: 15px; }
        .layout-picker input { display: none; }
        .layout-picker label { flex: 1; padding: 10px 5px; background: #f8f9fa; border: 1px solid #dee2e6; text-align: center; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: 600; }
        .layout-picker input:checked + label { background: var(--primary); color: white; border-color: var(--primary); }

        .btn-primary { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .result-card { padding: 15px; border-top: 1px solid #eee; display: none; text-align: center;}
        
        /* THE STICKER CANVAS (50mm x 30mm) */
        #html-template { position: absolute; left: -9999px; }
        .sticker-canvas { 
            width: 500px; height: 300px; 
            background: white; display: flex; flex-direction: column; 
            padding: 15px; box-sizing: border-box; color: black;
        }

        /* Layout 1: Barcode Only */
        .mode-barcode { align-items: center; justify-content: center; }
        .bc-img { width: 100%; height: 120px; object-fit: stretch; }

        /* Layout 2: QR Only */
        .mode-qr { flex-direction: row; align-items: center; gap: 20px; }

        /* Layout 3: Both */
        .mode-both { justify-content: space-between; }
        .mode-both .top-row { height: 80px; width: 100%; display: flex; justify-content: center; }
        .mode-both .bottom-row { display: flex; flex-grow: 1; align-items: center; gap: 15px; }
        .mode-both .info-col { flex-grow: 1; text-align: left; }
        .mode-both .qr-col { flex-shrink: 0; }

        .info-text { font-family: 'Inter', sans-serif; font-size: 20px; line-height: 1.3; }
        .info-text strong { font-size: 26px; display: block; }

        #final-sticker-img { width: 100%; max-width: 400px; border: 1px dashed #ccc; margin: 10px 0; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="app-header">
        <h1><i class="bi bi-printer-fill"></i> Research Label Gen</h1>
    </div>

    <div class="form-section">
        <div class="form-group">
            <label class="form-label">Patient IC (12 Digits)</label>
            <input type="text" id="gen_ic" class="form-control" placeholder="020502050075" maxlength="12">
        </div>
        <div class="form-group">
            <label class="form-label">Name / ID</label>
            <input type="text" id="gen_name" class="form-control" placeholder="ALI BIN AHMAD">
        </div>
        <div class="form-group">
            <label class="form-label">Study Notes</label>
            <input type="text" id="gen_notes" class="form-control" placeholder="Cohort A">
        </div>

        <label class="form-label">Select Layout</label>
        <div class="layout-picker">
            <input type="radio" name="layout" id="lay-bar" value="barcode" checked>
            <label for="lay-bar">Barcode Only</label>
            <input type="radio" name="layout" id="lay-qr" value="qr">
            <label for="lay-qr">QR Only</label>
            <input type="radio" name="layout" id="lay-both" value="both">
            <label for="lay-both">Both</label>
        </div>

        <button onclick="generateLabel()" class="btn-primary" id="btn-gen">Generate JPG Sticker</button>
    </div>

    <div id="html-template">
        <div id="canvas-target" class="sticker-canvas"></div>
    </div>

    <div id="result-area" class="result-card">
        <p style="font-size: 0.8rem; color:#666;">Long-press to Copy/Save</p>
        <img id="final-sticker-img" src="">
        <button onclick="location.reload()" class="btn-primary" style="background:#212529; margin-top:10px;">Reset</button>
    </div>
</div>

<script>
// --- INLINE ITF BARCODE GENERATOR (NO LIBRARY NEEDED) ---
function generateITF(text) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const patterns = ["00110", "10001", "01001", "11000", "00101", "10100", "01100", "00011", "10010", "01010"];
    
    // Interleave the digits
    let code = "0000"; // Start pattern (N-N-N-N)
    for (let i = 0; i < text.length; i += 2) {
        let digit1 = patterns[parseInt(text[i])];
        let digit2 = patterns[parseInt(text[i+1])];
        for (let j = 0; j < 5; j++) {
            code += digit1[j] + digit2[j];
        }
    }
    code += "100"; // Stop pattern (W-N-N)

    canvas.width = code.length * 4;
    canvas.height = 100;
    ctx.fillStyle = "white";
    ctx.fillRect(0,0, canvas.width, canvas.height);
    ctx.fillStyle = "black";

    let x = 0;
    for (let i = 0; i < code.length; i++) {
        let width = (code[i] === "1") ? 6 : 2; // Wide vs Narrow
        if (i % 2 === 0) ctx.fillRect(x, 0, width, 100); // Only draw bars (even indices)
        x += width;
    }
    return canvas.toDataURL();
}

function generateLabel() {
    const ic = document.getElementById('gen_ic').value.trim();
    const name = document.getElementById('gen_name').value.trim() || "---";
    const notes = document.getElementById('gen_notes').value.trim() || "N/A";
    const layout = document.querySelector('input[name="layout"]:checked').value;
    const target = document.getElementById('canvas-target');
    
    if(!ic || ic.length % 2 !== 0) return alert("Please enter a valid 12-digit IC.");

    target.className = "sticker-canvas mode-" + layout;
    target.innerHTML = "";
    const barcodeData = generateITF(ic);

    if (layout === 'barcode') {
        target.innerHTML = `
            <img src="${barcodeData}" class="bc-img">
            <div class="info-text" style="margin-top:15px;"><strong>${name}</strong>IC: ${ic}<br>Notes: ${notes}</div>`;
    } 
    else if (layout === 'qr') {
        target.innerHTML = `
            <div id="qr-box"></div>
            <div class="info-text"><strong>${name}</strong>IC: ${ic}<br>Notes: ${notes}</div>`;
        new QRCode(document.getElementById("qr-box"), { text: `${ic}|${name}|${notes}`, width: 190, height: 190 });
    } 
    else if (layout === 'both') {
        target.innerHTML = `
            <div class="top-row"><img src="${barcodeData}" style="height:80px; width:90%;"></div>
            <div class="bottom-row">
                <div class="info-col info-text"><strong>${name}</strong>IC: ${ic}<br><small>${notes}</small></div>
                <div id="qr-box" class="qr-col"></div>
            </div>`;
        new QRCode(document.getElementById("qr-box"), { text: `${ic}|${name}|${notes}`, width: 120, height: 120 });
    }

    setTimeout(() => {
        html2canvas(target, { scale: 2 }).then(canvas => {
            document.getElementById('final-sticker-img').src = canvas.toDataURL("image/jpeg", 0.9);
            document.getElementById('result-area').style.display = "block";
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        });
    }, 300);
}
</script>
</body>
</html>
