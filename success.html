<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Successful - PalliCalc</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; }

    .success-body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 40px 20px;
        background-color: #f1f5f9; /* Slate-100 */
        font-family: 'Inter', sans-serif;
        color: #334155;
    }

    .success-card {
        background: white;
        width: 100%;
        max-width: 480px;
        padding: 40px 32px;
        border-radius: 16px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        text-align: center;
    }

    .icon-container {
        margin-bottom: 24px;
    }

    .bi-envelope-check-fill {
        font-size: 4rem;
        color: #0ea5e9; /* Sky-500 */
    }

    .success-title {
        font-size: 24px;
        font-weight: 700;
        color: #0f172a;
        margin-bottom: 12px;
        margin-top: 0;
    }

    .success-text {
        color: #64748b;
        font-size: 15px;
        line-height: 1.6;
        margin-bottom: 24px;
    }

    .email-highlight {
        color: #0ea5e9;
        font-weight: 600;
        display: block;
        margin-top: 4px;
        word-break: break-all;
    }

    .btn-primary {
        display: block;
        width: 100%;
        padding: 12px;
        background-color: #0ea5e9;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 14px;
        text-decoration: none;
        cursor: pointer;
        transition: background-color 0.2s;
    }

    .btn-primary:hover {
        background-color: #0284c7; /* Sky-600 */
    }

    .legal-footer {
        text-align: center;
        color: #64748b;
        font-size: 0.8rem;
        width: 100%;
        max-width: 480px;
        padding-top: 24px;
    }
  </style>
</head>
<body class="success-body">

  <div class="success-card">
    <div class="icon-container">
      <i class="bi bi-envelope-check-fill"></i>
    </div>
    
    <h1 class="success-title">Verify Your Email</h1>
    
    <p class="success-text">
      Thank you for registering! We have automatically dispatched a secure verification link to your inbox:
      <span id="display-email" class="email-highlight">Loading account details...</span>
    </p>

    <p class="success-text" style="font-size: 13px; background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0;">
      <i class="bi bi-info-circle" style="color: #0ea5e9; margin-right: 4px;"></i> 
      Please check your spam/junk folder if the verification email does not arrive within 2 minutes.
    </p>
    
    <a href="index.html" class="btn-primary">Back to Login</a>
  </div>
  
  <div class="legal-footer">
    <p><strong>&copy; 2026 Alivioscript Solutions</strong></p>
  </div>

  <script>
    // Initialize Firebase
    const config = {
        apiKey: "AIzaSyAioaDxAEh3Cd-8Bvad9RgWXoOzozGeE_s",
        authDomain: "pallicalc-eabdc.firebaseapp.com",
        projectId: "pallicalc-eabdc"
    };
    if (!firebase.apps.length) firebase.initializeApp(config);

    // Track state to prevent multiple emails firing on rapid re-renders
    let emailSent = false;

    firebase.auth().onAuthStateChanged(async (user) => {
        const emailDisplay = document.getElementById('display-email');
        
        if (user) {
            emailDisplay.textContent = user.email;
            
            // Trigger verification email once
            if (!emailSent) {
                try {
                    emailSent = true;
                    await user.sendEmailVerification();
                    console.log("Verification email dispatched successfully.");
                } catch (error) {
                    console.error("Error sending verification email:", error);
                    // If they refresh too quickly, Firebase throws an auth/too-many-requests error
                    if (error.code === 'auth/too-many-requests') {
                        console.log("Email already sent recently.");
                    }
                }
            }
        } else {
            // Edge case: If they open this page manually without logging in
            emailDisplay.textContent = "your registered email address";
        }
    });
  </script>
</body>
</html>
